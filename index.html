<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Girls vs Boys - Manual Game</title>
    <style>
        * {
            user-select: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Arial', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 30px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }
        .teams {
            display: flex;
            gap: 60px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .team {
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            padding: 25px 35px;
            text-align: center;
            min-width: 220px;
            transition: transform 0.2s;
        }
        .team:active {
            transform: scale(0.98);
        }
        .girls-team {
            border-bottom: 6px solid #ff69b4;
            box-shadow: 0 0 20px rgba(255,105,180,0.3);
        }
        .boys-team {
            border-bottom: 6px solid #4169e1;
            box-shadow: 0 0 20px rgba(65,105,225,0.3);
        }
        .team-icon {
            font-size: 64px;
            margin-bottom: 10px;
        }
        .team-name {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .girls-name { color: #ff69b4; text-shadow: 0 0 10px #ff69b4; }
        .boys-name { color: #4169e1; text-shadow: 0 0 10px #4169e1; }
        .score {
            font-size: 80px;
            font-weight: bold;
            margin: 15px 0;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 10px;
        }
        .girls-score { color: #ff69b4; }
        .boys-score { color: #4169e1; }
        .point-btn {
            font-size: 28px;
            font-weight: bold;
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            font-weight: bold;
        }
        .girls-btn {
            background: #ff69b4;
            color: white;
            box-shadow: 0 5px 0 #b13b6e;
        }
        .girls-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b13b6e;
        }
        .boys-btn {
            background: #4169e1;
            color: white;
            box-shadow: 0 5px 0 #1e3a8a;
        }
        .boys-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1e3a8a;
        }
        .timer-section {
            margin: 25px 0;
        }
        .timer {
            font-size: 68px;
            font-weight: bold;
            font-family: monospace;
            background: rgba(0,0,0,0.8);
            display: inline-block;
            padding: 15px 30px;
            border-radius: 60px;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
            letter-spacing: 5px;
        }
        .controls {
            margin-top: 25px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .ctrl-btn {
            font-size: 18px;
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            background: #2c3e66;
            color: white;
            transition: all 0.2s;
        }
        .ctrl-btn:active {
            transform: scale(0.96);
        }
        .reset-btn {
            background: #dc2626;
        }
        .winner-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #f5af19, #f12711);
            color: white;
            font-size: 56px;
            font-weight: bold;
            padding: 40px 80px;
            border-radius: 60px;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
            z-index: 1000;
            text-align: center;
            white-space: nowrap;
            font-family: 'Arial', sans-serif;
            border: 3px solid gold;
            animation: bounce 0.5s ease;
        }
        @keyframes bounce {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            80% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .hidden {
            display: none;
        }
        .round-status {
            margin-top: 15px;
            font-size: 20px;
            color: #ffaa44;
            font-weight: bold;
        }
        @media (max-width: 800px) {
            .teams { gap: 20px; }
            .team { padding: 15px 20px; min-width: 160px; }
            .score { font-size: 48px; }
            .point-btn { font-size: 20px; padding: 8px 20px; }
            .timer { font-size: 40px; }
            .winner-popup { font-size: 32px; padding: 25px 50px; white-space: nowrap; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="teams">
        <!-- GIRLS TEAM -->
        <div class="team girls-team">
            <div class="team-icon">👧</div>
            <div class="team-name girls-name">GIRLS</div>
            <div class="score girls-score" id="girlsScore">0</div>
            <button class="point-btn girls-btn" id="girlsPlusBtn">+1 POINT</button>
        </div>

        <!-- BOYS TEAM -->
        <div class="team boys-team">
            <div class="team-icon">👦</div>
            <div class="team-name boys-name">BOYS</div>
            <div class="score boys-score" id="boysScore">0</div>
            <button class="point-btn boys-btn" id="boysPlusBtn">+1 POINT</button>
        </div>
    </div>

    <div class="timer-section">
        <div class="timer" id="timerDisplay">05:00</div>
        <div class="round-status" id="roundStatus">Round in progress</div>
    </div>

    <div class="controls">
        <button class="ctrl-btn reset-btn" id="resetRoundBtn">🔄 NEW ROUND</button>
    </div>
</div>

<div id="winnerPopup" class="winner-popup hidden"></div>

<script>
    // Game state
    let girls = 0;
    let boys = 0;
    let timeLeft = 300; // 5 minutes in seconds
    let roundActive = true;
    let timerInterval = null;

    // DOM elements
    const girlsScoreEl = document.getElementById('girlsScore');
    const boysScoreEl = document.getElementById('boysScore');
    const timerDisplay = document.getElementById('timerDisplay');
    const roundStatus = document.getElementById('roundStatus');
    const winnerPopup = document.getElementById('winnerPopup');

    // Update UI
    function updateUI() {
        girlsScoreEl.textContent = girls;
        boysScoreEl.textContent = boys;
        
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        
        if (!roundActive) {
            roundStatus.textContent = 'Round ended — click NEW ROUND to start';
        } else {
            roundStatus.textContent = 'Round in progress';
        }
    }

    // End round and show winner popup
    function endRound() {
        if (!roundActive) return;
        
        roundActive = false;
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        
        let winnerText = '';
        if (girls > boys) {
            winnerText = '🏆 GIRLS WIN! 🏆';
        } else if (boys > girls) {
            winnerText = '🏆 BOYS WIN! 🏆';
        } else {
            winnerText = '🤝 IT\'S A TIE! 🤝';
        }
        
        // Show popup
        winnerPopup.textContent = winnerText;
        winnerPopup.classList.remove('hidden');
        
        // Auto-hide popup after 5 seconds
        setTimeout(() => {
            winnerPopup.classList.add('hidden');
        }, 5000);
        
        roundStatus.textContent = `ROUND OVER! ${winnerText} Click NEW ROUND to start next hunt.`;
        updateUI();
    }

    // Start timer
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            if (timeLeft > 0 && roundActive) {
                timeLeft--;
                updateUI();
                
                if (timeLeft === 0) {
                    endRound();
                }
            } else if (timeLeft === 0) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }, 1000);
    }

    // Reset the game (new round)
    function resetRound() {
        // Reset scores
        girls = 0;
        boys = 0;
        timeLeft = 300; // 5 minutes
        roundActive = true;
        
        // Clear any existing timer
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        
        // Hide popup if visible
        winnerPopup.classList.add('hidden');
        
        // Start fresh timer
        startTimer();
        
        // Update UI
        updateUI();
        roundStatus.textContent = 'New round started! 5 minutes on the clock.';
    }

    // Add points
    function addGirlsPoint() {
        if (!roundActive) {
            roundStatus.textContent = 'Round is over! Click NEW ROUND to start.';
            return;
        }
        girls++;
        updateUI();
    }
    
    function addBoysPoint() {
        if (!roundActive) {
            roundStatus.textContent = 'Round is over! Click NEW ROUND to start.';
            return;
        }
        boys++;
        updateUI();
    }

    // Event listeners
    document.getElementById('girlsPlusBtn').addEventListener('click', addGirlsPoint);
    document.getElementById('boysPlusBtn').addEventListener('click', addBoysPoint);
    document.getElementById('resetRoundBtn').addEventListener('click', resetRound);

    // Initialize
    resetRound();
</script>
</body>
</html>
