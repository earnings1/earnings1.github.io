<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Girls vs Boys - 1 Minute Rounds</title>
    <style>
        * {
            user-select: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Arial', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 30px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }
        /* Timer at the top */
        .timer-section {
            margin-bottom: 30px;
        }
        .timer {
            font-size: 68px;
            font-weight: bold;
            font-family: monospace;
            background: rgba(0,0,0,0.8);
            display: inline-block;
            padding: 15px 30px;
            border-radius: 60px;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
            letter-spacing: 5px;
        }
        .round-status {
            margin-top: 10px;
            font-size: 18px;
            color: #ffaa44;
            font-weight: bold;
        }
        .teams {
            display: flex;
            gap: 60px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .team {
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            padding: 25px 35px;
            text-align: center;
            min-width: 260px;
            transition: transform 0.2s;
        }
        .girls-team {
            border-bottom: 6px solid #ff69b4;
            box-shadow: 0 0 20px rgba(255,105,180,0.3);
        }
        .boys-team {
            border-bottom: 6px solid #4169e1;
            box-shadow: 0 0 20px rgba(65,105,225,0.3);
        }
        .team-icon {
            font-size: 64px;
            margin-bottom: 10px;
        }
        .team-name {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .girls-name { color: #ff69b4; text-shadow: 0 0 10px #ff69b4; }
        .boys-name { color: #4169e1; text-shadow: 0 0 10px #4169e1; }
        .score {
            font-size: 80px;
            font-weight: bold;
            margin: 15px 0;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 10px;
        }
        .girls-score { color: #ff69b4; }
        .boys-score { color: #4169e1; }
        .point-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .point-btn {
            font-size: 20px;
            font-weight: bold;
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .girls-btn {
            background: #ff69b4;
            color: white;
            box-shadow: 0 4px 0 #b13b6e;
        }
        .girls-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b13b6e;
        }
        .boys-btn {
            background: #4169e1;
            color: white;
            box-shadow: 0 4px 0 #1e3a8a;
        }
        .boys-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1e3a8a;
        }
        .rounds-won {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.3);
            font-size: 18px;
        }
        .rounds-won span {
            font-size: 28px;
            font-weight: bold;
        }
        .girls-won { color: #ff69b4; }
        .boys-won { color: #4169e1; }
        .controls {
            margin-top: 25px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .ctrl-btn {
            font-size: 18px;
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            background: #2c3e66;
            color: white;
            transition: all 0.2s;
        }
        .ctrl-btn:active {
            transform: scale(0.96);
        }
        .reset-btn {
            background: #dc2626;
        }
        .winner-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #f5af19, #f12711);
            color: white;
            font-size: 56px;
            font-weight: bold;
            padding: 40px 80px;
            border-radius: 60px;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
            z-index: 1000;
            text-align: center;
            white-space: nowrap;
            border: 3px solid gold;
            animation: bounce 0.5s ease;
        }
        @keyframes bounce {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            80% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .hidden {
            display: none;
        }
        @media (max-width: 800px) {
            .teams { gap: 20px; }
            .team { padding: 15px 20px; min-width: 220px; }
            .score { font-size: 48px; }
            .point-btn { font-size: 16px; padding: 8px 14px; }
            .timer { font-size: 40px; }
            .winner-popup { font-size: 32px; padding: 25px 50px; white-space: nowrap; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- TIMER AT THE TOP -->
    <div class="timer-section">
        <div class="timer" id="timerDisplay">01:00</div>
        <div class="round-status" id="roundStatus">Round in progress | 1 minute hunt</div>
    </div>

    <div class="teams">
        <!-- GIRLS TEAM -->
        <div class="team girls-team">
            <div class="team-icon">👧</div>
            <div class="team-name girls-name">GIRLS</div>
            <div class="score girls-score" id="girlsScore">0</div>
            <div class="point-buttons">
                <button class="point-btn girls-btn" id="girlsPlus1Btn">+1</button>
                <button class="point-btn girls-btn" id="girlsPlus5Btn">+5</button>
                <button class="point-btn girls-btn" id="girlsPlus10Btn">+10</button>
            </div>
            <div class="rounds-won">
                🏆 ROUNDS WON: <span class="girls-won" id="girlsRoundsWon">0</span>
            </div>
        </div>

        <!-- BOYS TEAM -->
        <div class="team boys-team">
            <div class="team-icon">👦</div>
            <div class="team-name boys-name">BOYS</div>
            <div class="score boys-score" id="boysScore">0</div>
            <div class="point-buttons">
                <button class="point-btn boys-btn" id="boysPlus1Btn">+1</button>
                <button class="point-btn boys-btn" id="boysPlus5Btn">+5</button>
                <button class="point-btn boys-btn" id="boysPlus10Btn">+10</button>
            </div>
            <div class="rounds-won">
                🏆 ROUNDS WON: <span class="boys-won" id="boysRoundsWon">0</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" id="girlsWinBtn">👧 GIRLS WIN ROUND</button>
        <button class="ctrl-btn" id="boysWinBtn">👦 BOYS WIN ROUND</button>
        <button class="ctrl-btn reset-btn" id="resetRoundBtn">🔄 NEW ROUND</button>
        <button class="ctrl-btn" id="resetGameBtn">🔁 RESET ALL WINS</button>
    </div>
</div>

<div id="winnerPopup" class="winner-popup hidden"></div>

<script>
    // Game state
    let girlsScore = 0;
    let boysScore = 0;
    let girlsRoundsWon = 0;
    let boysRoundsWon = 0;
    let timeLeft = 60; // 1 minute in seconds
    let roundActive = true;
    let timerInterval = null;

    // DOM elements
    const girlsScoreEl = document.getElementById('girlsScore');
    const boysScoreEl = document.getElementById('boysScore');
    const girlsRoundsEl = document.getElementById('girlsRoundsWon');
    const boysRoundsEl = document.getElementById('boysRoundsWon');
    const timerDisplay = document.getElementById('timerDisplay');
    const roundStatus = document.getElementById('roundStatus');
    const winnerPopup = document.getElementById('winnerPopup');

    // Update UI
    function updateUI() {
        girlsScoreEl.textContent = girlsScore;
        boysScoreEl.textContent = boysScore;
        girlsRoundsEl.textContent = girlsRoundsWon;
        boysRoundsEl.textContent = boysRoundsWon;
        
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        
        if (!roundActive) {
            roundStatus.textContent = 'Round ended — click NEW ROUND to start';
        } else {
            roundStatus.textContent = 'Round in progress | 1 minute hunt';
        }
    }

    // Show popup message
    function showPopup(message) {
        winnerPopup.textContent = message;
        winnerPopup.classList.remove('hidden');
        setTimeout(() => {
            winnerPopup.classList.add('hidden');
        }, 4000);
    }

    // End round and declare winner
    function endRound() {
        if (!roundActive) return;
        
        roundActive = false;
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        
        let winnerText = '';
        
        if (girlsScore > boysScore) {
            winnerText = '🏆 GIRLS WIN THIS ROUND! 🏆';
        } else if (boysScore > girlsScore) {
            winnerText = '🏆 BOYS WIN THIS ROUND! 🏆';
        } else {
            winnerText = '🤝 IT\'S A TIE! NO POINTS AWARDED 🤝';
        }
        
        showPopup(winnerText);
        roundStatus.textContent = `ROUND OVER! ${winnerText} Click NEW ROUND to start next hunt.`;
        updateUI();
    }

    // Award win to a team (manual button)
    function awardWin(team) {
        if (roundActive) {
            showPopup('⚠️ End the current round first! Click "NEW ROUND" after.');
            return;
        }
        
        if (team === 'girls') {
            girlsRoundsWon++;
            showPopup('👧 GIRLS WIN THE ROUND! +1 ROUND WIN 👧');
        } else if (team === 'boys') {
            boysRoundsWon++;
            showPopup('👦 BOYS WIN THE ROUND! +1 ROUND WIN 👦');
        }
        updateUI();
    }

    // Start timer
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            if (timeLeft > 0 && roundActive) {
                timeLeft--;
                updateUI();
                
                if (timeLeft === 0) {
                    endRound();
                }
            }
        }, 1000);
    }

    // Reset round (keep wins, reset scores, start timer)
    function resetRound() {
        girlsScore = 0;
        boysScore = 0;
        timeLeft = 60; // 1 minute
        roundActive = true;
        
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        
        startTimer();
        updateUI();
        roundStatus.textContent = 'New round started! 1 minute on the clock.';
    }

    // Reset everything (wins + scores)
    function resetGame() {
        girlsScore = 0;
        boysScore = 0;
        girlsRoundsWon = 0;
        boysRoundsWon = 0;
        timeLeft = 60;
        roundActive = true;
        
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        
        startTimer();
        updateUI();
        roundStatus.textContent = 'Game reset! New round started.';
        showPopup('🔄 GAME FULLY RESET 🔄');
    }

    // Add points (checks if round is active)
    function addPoints(team, points) {
        if (!roundActive) {
            roundStatus.textContent = 'Round is over! Click NEW ROUND to start.';
            showPopup('⚠️ Round is over! Start a new round first.');
            return;
        }
        
        if (team === 'girls') {
            girlsScore += points;
        } else if (team === 'boys') {
            boysScore += points;
        }
        updateUI();
    }

    // Event listeners
    document.getElementById('girlsPlus1Btn').addEventListener('click', () => addPoints('girls', 1));
    document.getElementById('girlsPlus5Btn').addEventListener('click', () => addPoints('girls', 5));
    document.getElementById('girlsPlus10Btn').addEventListener('click', () => addPoints('girls', 10));
    
    document.getElementById('boysPlus1Btn').addEventListener('click', () => addPoints('boys', 1));
    document.getElementById('boysPlus5Btn').addEventListener('click', () => addPoints('boys', 5));
    document.getElementById('boysPlus10Btn').addEventListener('click', () => addPoints('boys', 10));
    
    document.getElementById('girlsWinBtn').addEventListener('click', () => awardWin('girls'));
    document.getElementById('boysWinBtn').addEventListener('click', () => awardWin('boys'));
    document.getElementById('resetRoundBtn').addEventListener('click', resetRound);
    document.getElementById('resetGameBtn').addEventListener('click', resetGame);

    // Initialize
    resetRound();
</script>
</body>
</html>
